name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend-critical-tests:
    name: Backend Critical Security/Resilience Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Run critical backend tests
        env:
          SECRET_KEY: test_secret_key_123456789012345678901234
          POSTGRES_PASSWORD: test_postgres_password
          NEO4J_PASSWORD: test_neo4j_password
          GROQ_API_KEY: gsk_test_key
        run: |
          pytest backend/tests/test_auth.py \
            backend/tests/test_security_middleware.py \
            backend/tests/test_results_fallback.py \
            backend/tests/test_simulation_route.py

  backend:
    name: Backend Lint Type Tests + Coverage
    runs-on: ubuntu-latest
    needs: backend-critical-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov ruff mypy

      - name: Lint backend (ruff)
        run: |
          ruff check backend --select E9,F63,F7,F82 --output-format=github

      - name: Type-check backend (mypy)
        run: |
          mypy --config-file backend/mypy.ini

      - name: Run backend tests with coverage
        env:
          SECRET_KEY: test_secret_key_123456789012345678901234
          POSTGRES_PASSWORD: test_postgres_password
          NEO4J_PASSWORD: test_neo4j_password
          GROQ_API_KEY: gsk_test_key
        run: |
          pytest backend/tests \
            --cov=backend \
            --cov-fail-under=12 \
            --cov-report=xml:backend/coverage.xml \
            --cov-report=term

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: warn

  frontend:
    name: Frontend Lint Build Tests + Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Run frontend tests with coverage
        run: npm run test:coverage
        working-directory: frontend

      - name: Upload frontend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: warn

  security-backend:
    name: Backend Dependency Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Scan Python dependencies
        run: pip-audit --strict -r backend/requirements.txt

  security-frontend:
    name: Frontend Dependency Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Scan Node dependencies
        run: npm audit --audit-level=high --omit=dev
        working-directory: frontend

  security-secrets:
    name: Repository Secret Scan (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan repository for leaked secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: gitleaks.toml

      - name: Enforce secret-handling policy
        shell: bash
        run: |
          set -euo pipefail

          if git ls-files | grep -E '(^|/)\.env($|\.|$)' | grep -v '^\.env\.example$' >/dev/null; then
            echo "Tracked .env files are not allowed in the repository." >&2
            exit 1
          fi

          python - <<'PY'
          from pathlib import Path

          example = Path('.env.example').read_text(encoding='utf-8').splitlines()
          expected = {
              'SECRET_KEY': 'REPLACE_WITH_64_CHAR_HEX_SECRET',
              'GROQ_API_KEY': 'gsk_REPLACE_WITH_YOUR_GROQ_API_KEY',
              'POSTGRES_PASSWORD': 'asioe_pg_REPLACE_WITH_STRONG_PASSWORD',
              'NEO4J_PASSWORD': 'asioe_neo4j_REPLACE',
              'REDIS_PASSWORD': 'asioe_redis_REPLACE',
          }

          for key, placeholder in expected.items():
              matches = [line for line in example if line.startswith(f'{key}=')]
              if not matches:
                  raise SystemExit(f'Missing required placeholder for {key} in .env.example')
              if not any(placeholder in line for line in matches):
                  raise SystemExit(f'{key} must remain a placeholder in .env.example')
          PY
