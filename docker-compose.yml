version: "3.9"

# ============================================================
# ASIOE — Docker Compose (Production Stack)
# Build context: project root (asioe/)
# Run from: asioe/ directory with: docker-compose up --build
# ============================================================

networks:
  asioe-net:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  backend_data:

services:

  postgres:
    image: postgres:16-alpine
    container_name: asioe-postgres
    restart: unless-stopped
    networks: [asioe-net]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: asioe
      POSTGRES_USER: asioe_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asioe_user -d asioe"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.21-community
    container_name: asioe-neo4j
    restart: unless-stopped
    networks: [asioe-net]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7.2-alpine
    container_name: asioe-redis
    restart: unless-stopped
    networks: [asioe-net]
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-asioe_redis_secret}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-asioe_redis_secret}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend
    container_name: asioe-backend
    restart: unless-stopped
    networks: [asioe-net]
    volumes:
      - backend_data:/app/data/processed
    environment:
      APP_ENV: production
      DATA_DIR: /app/data
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: asioe
      POSTGRES_USER: asioe_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-asioe_redis_secret}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_PRIMARY_MODEL: llama-3.3-70b-versatile
      EMBEDDING_MODEL: sentence-transformers/all-mpnet-base-v2
      ALLOWED_ORIGINS: '["http://localhost","http://localhost:80","http://localhost:5173"]'
      LOG_LEVEL: INFO
      ENABLE_METRICS: "true"
      AUTH_ENABLED: "true"
      API_AUTH_KEYS: ${API_AUTH_KEYS}
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/live"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.frontend
    container_name: asioe-frontend
    restart: unless-stopped
    networks: [asioe-net]
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
