version: "3.9"

# ============================================================
# ASIOE — Docker Compose (Production Stack)
# Services: backend · frontend · postgres · neo4j · redis
# ============================================================

networks:
  asioe-net:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  backend_processed_data:

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: asioe-postgres
    restart: unless-stopped
    networks: [asioe-net]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: asioe
      POSTGRES_USER: asioe_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asioe_user -d asioe"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Neo4j ─────────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.21-community
    container_name: asioe-neo4j
    restart: unless-stopped
    networks: [asioe-net]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_dbms_memory_pagecache_size: 512m
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 20s
      timeout: 10s
      retries: 10

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: asioe-redis
    restart: unless-stopped
    networks: [asioe-net]
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-asioe_redis_secret}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../infra/docker/Dockerfile.backend
    container_name: asioe-backend
    restart: unless-stopped
    networks: [asioe-net]
    volumes:
      - backend_processed_data:/app/data/processed
    environment:
      APP_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: asioe
      POSTGRES_USER: asioe_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-asioe_redis_secret}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_PRIMARY_MODEL: llama-3.3-70b-versatile
      EMBEDDING_MODEL: sentence-transformers/all-mpnet-base-v2
      ALLOWED_ORIGINS: '["http://localhost:80","http://localhost:3000","https://yourdomain.com"]'
      LOG_LEVEL: INFO
      ENABLE_METRICS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/live"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ── React Frontend (Nginx) ────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.frontend
    container_name: asioe-frontend
    restart: unless-stopped
    networks: [asioe-net]
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
